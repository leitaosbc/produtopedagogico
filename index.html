    <script>
        // Estado Global da Aplicação
        let allQuestions = [];
        let currentLevel = null;
        let currentHashtag = null; // 'any' ou a hashtag escolhida
        let currentQuestion = null;
        
        let pendingHelpKey = null;
        let pendingHelpTitle = null;

        // Inicializa a aplicação ao carregar a janela
        window.onload = async function() {
            await loadCSVData();
        };

        async function loadCSVData() {
            const statusIndicator = document.getElementById('db-status');
            
            statusIndicator.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-indigo-500"></i> Carregando dados...`;
            
            try {
                // Tenta carregar o arquivo CSV que deve estar na mesma pasta no GitHub
                // A adição do getTime() previne que o navegador use um arquivo CSV antigo salvo no cache
                const response = await fetch('GUIAPP - Página1.csv?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
                
                // Força a leitura em UTF-8 para manter acentuação e emojis (se houver) intactos
                const arrayBuffer = await response.arrayBuffer();
                const decoder = new TextDecoder('utf-8');
                const csvText = decoder.decode(arrayBuffer);
                
                allQuestions = parseCSV(csvText);
                
                if (allQuestions.length > 0) {
                    statusIndicator.innerHTML = `<i class="fa-solid fa-check-circle text-emerald-500"></i> ${allQuestions.length} questões`;
                    console.log("Dados carregados com sucesso!", allQuestions);
                } else {
                    statusIndicator.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-amber-500"></i> Planilha vazia`;
                }
            } catch (error) {
                console.error("Erro ao carregar o CSV:", error);
                statusIndicator.innerHTML = `<i class="fa-solid fa-circle-xmark text-rose-500"></i> Erro de leitura`;
            }
        }

        // Função para converter o texto do CSV em um Array de Objetos JavaScript
        function parseCSV(text) {
            const lines = text.trim().split(/\r?\n/);
            if (lines.length < 2) return [];
            
            // Detecta se o separador usado na planilha é vírgula ou ponto-e-vírgula
            const sep = lines[0].includes(';') ? ';' : ',';
            
            // Função robusta para separar as colunas considerando aspas (protege vírgulas dentro do texto)
            function splitCSVLine(line) {
                let result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char === '"' && line[i+1] === '"') {
                        current += '"'; i++; 
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === sep && !inQuotes) {
                        result.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current);
                return result;
            }

            const rawHeaders = splitCSVLine(lines[0]);
            const colMap = {};
            
            // Mapeamento inteligente das colunas baseado nas palavras-chave da sua planilha
            rawHeaders.forEach((h, index) => {
                const normalized = h.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (normalized === 'id' || normalized.includes('questao')) colMap['id'] = index;
                else if (normalized.includes('nivel')) colMap['nivel'] = index;
                else if (normalized.includes('endereco') || normalized.includes('enunciado')) colMap['enunciado'] = index;
                else if (normalized.includes('hashtag')) colMap['hashtags'] = index;
                else if (normalized.includes('ajuda1') || normalized.includes('dica1') || normalized.includes('pensar')) colMap['ajuda1'] = index;
                else if (normalized.includes('ajuda2') || normalized.includes('dica2') || normalized.includes('pedras')) colMap['ajuda2'] = index;
                else if (normalized.includes('gabarito')) colMap['gabarito'] = index;
            });

            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = splitCSVLine(lines[i]);
                
                data.push({
                    id: values[colMap['id']] || `Q${i}`,
                    nivel: values[colMap['nivel']] ? values[colMap['nivel']].trim() : '',
                    enunciado: values[colMap['enunciado']] ? values[colMap['enunciado']].trim() : '',
                    hashtags: values[colMap['hashtags']] ? values[colMap['hashtags']].trim() : '',
                    ajuda1: values[colMap['ajuda1']] ? values[colMap['ajuda1']].trim() : '',
                    ajuda2: values[colMap['ajuda2']] ? values[colMap['ajuda2']].trim() : '',
                    gabarito: values[colMap['gabarito']] ? values[colMap['gabarito']].trim() : ''
                });
            }
            return data;
        }
